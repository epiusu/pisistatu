<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="description" content="PisiLinux paketlerini developer.pisilinux.org üzerinden tarihine göre takip edin."/>
  <meta name="theme-color" content="#0f1117"/>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://developer.pisilinux.org; img-src 'self' data:; frame-ancestors 'none';"/>
  <title>PisiLinux Paket Takip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<a href="#main" class="skip-link">İçeriğe geç</a>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">

      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
        </div>
        <div>
          <h1>PisiLinux <span class="accent">Paket Takip</span></h1>
          <p class="brand-sub">
            <a href="https://developer.pisilinux.org/packages" target="_blank" rel="noopener noreferrer">developer.pisilinux.org/packages</a>
          </p>
        </div>
      </div>

      <!-- Stat chips -->
      <div class="chips" id="chips" hidden aria-label="Durum filtreleri">
        <button class="chip chip-all active" data-f="all">Tümü <b id="c-all">–</b></button>
        <button class="chip chip-ok"   data-f="updated">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,6 4,9.5 11,2.5"/></svg>
          Güncel <b id="c-ok">–</b>
        </button>
        <button class="chip chip-warn" data-f="stale">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 2v3.5M6 8v.5"/><path d="M1 10.5 6 1l5 9.5H1z"/></svg>
          Orta <b id="c-warn">–</b>
        </button>
        <button class="chip chip-bad"  data-f="old">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M2 2l8 8M10 2l-8 8"/></svg>
          Eski <b id="c-bad">–</b>
        </button>
      </div>

    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="search-wrap">
        <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="searchInput" placeholder="Paket adı, sürüm veya kategori ara…" aria-label="Paket ara" maxlength="100" autocomplete="off" spellcheck="false"/>
      </div>
      <select id="catFilter" aria-label="Kategori"><option value="all">Tüm kategoriler</option></select>
      <select id="repoFilter" aria-label="Depo"><option value="all">Tüm depolar</option></select>
      <button class="btn btn-load" id="loadBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Yükle
      </button>
      <button class="btn btn-refresh" id="refreshBtn" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Yenile
      </button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progWrap" hidden><div class="progress-fill" id="progFill"></div></div>

    <!-- Status bar -->
    <div class="status-bar" role="status" aria-live="polite">
      <span class="sdot" id="sdot"></span>
      <span id="stext">Yüklemek için "Yükle" butonuna basın.</span>
    </div>
  </header>

  <!-- MAIN -->
  <main id="main" class="main">

    <!-- Results bar -->
    <div class="results-bar" id="resultsBar" hidden>
      <span id="resultsCount" role="status" aria-live="polite"></span>
      <div class="results-actions">
        <button class="btn-csv" id="csvBtn" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          CSV
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="tbl-outer">
      <table id="pkgTable" aria-label="PisiLinux paket listesi">
        <thead>
          <tr>
            <th class="c-name"    data-sort="name"     tabindex="0" aria-sort="none">Paket Adı <span class="sa" id="sa-name"></span></th>
            <th class="c-version" data-sort="version"  tabindex="0" aria-sort="none">Sürüm <span class="sa" id="sa-version"></span></th>
            <th class="c-cat"     data-sort="category" tabindex="0" aria-sort="none">Kategori <span class="sa" id="sa-category"></span></th>
            <th class="c-repo"    data-sort="repo"     tabindex="0" aria-sort="none">Depo <span class="sa" id="sa-repo"></span></th>
            <th class="c-status"  data-sort="statusKey" tabindex="0" aria-sort="none">Durum <span class="sa" id="sa-statusKey"></span></th>
            <th class="c-note"    >Kısa Not</th>
          </tr>
        </thead>
        <tbody id="pkgBody">
          <tr><td colspan="6">
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
              <p>Yüklemek için <strong>Yükle</strong> butonuna tıklayın.</p>
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="https://pisilinux.org" target="_blank" rel="noopener noreferrer">pisilinux.org</a>
        <a href="https://developer.pisilinux.org" target="_blank" rel="noopener noreferrer">developer</a>
        <a href="https://github.com/pisilinux" target="_blank" rel="noopener noreferrer">GitHub</a>
      </div>
      <span class="footer-note">Kaynak: developer.pisilinux.org · Önbellek 30 dk · <span id="lastFetch"></span></span>
    </div>
  </footer>

</div>
<script src="tracker.js"></script>
</body>
</html>
